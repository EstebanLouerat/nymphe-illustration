[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# [dev]
#   command = "npm run dev"
#   targetPort = 3000
#   port = 8888  

[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/checkout"
  status = 200

[[redirects]]
  from = "/api/validate-promo"
  to = "/.netlify/functions/validate-promo"
  status = 200

[[redirects]]
  from = "/api/shipping-rate"
  to = "/.netlify/functions/get-shipping-rate"
  status = 200

[[redirects]]
  from = "/api/webhook"
  to = "/.netlify/functions/webhook"
  status = 200

[[redirects]]
  from = "/api/orders"
  to = "/.netlify/functions/orders"
  status = 200

[[redirects]]
  from = "/api/popularity"
  to = "/.netlify/functions/popularity"
  status = 200

[[redirects]]
  from = "/api/link-orders"
  to = "/.netlify/functions/link-orders"
  status = 200

